# Plugin 配置
pluginGroup=com.example.rustsearch
pluginName=RustSearch
pluginVersion=1.1.0

# IntelliJ Platform 配置(对应本地 Android Studio 2026.1, AI-261)
pluginSinceBuild=231
pluginUntilBuild=261.*
platformType=IC
platformVersion=2023.1
platformPlugins=

# Kotlin 与 Java 配置
# 使用 Java 17:IC-2023.1 运行于 JDK 17,AS 261 的 JDK 21 向后兼容
javaVersion=17
kotlin.stdlib.default.dependency=false

# Gradle 配置
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true

# 注意:此前曾配置 systemProp.javax.net.ssl.trustStoreType=KeychainStore 试图解决 SSL 问题,
# 实测该配置反而破坏了 Java 默认 cacerts 的工作(默认 cacerts 能访问阿里云/Maven Central HTTPS,
# 启用 KeychainStore 后 PKIX path building failed)。已移除。

# Enabled parallel sync for Gradle 9.4+
org.gradle.tooling.parallel=true
